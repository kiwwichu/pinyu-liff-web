<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#48a2e8" />
  <title>快樂小狗｜管理後台</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand">快樂小狗 Pinyu</div>
        <div class="subtitle">管理後台</div>
      </div>
      <button id="btnRefresh" class="icon-btn" type="button" aria-label="重新整理">↻</button>
    </header>

    <main id="app">
      <section class="state-card">
        <div class="spinner"></div>
        <p>正在驗證管理員身分…</p>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">首頁</button>
      <button class="nav-item" data-page="orders">訂單</button>
      <button class="nav-item" data-page="notifications">通知</button>
      <button class="nav-item" data-page="create">新增</button>
      <button class="nav-item" data-page="visits">到府</button>
    </nav>
  </div>

  <template id="dashboardTemplate">
    <section class="summary-grid">
      <button class="summary-card" data-open="orders">
        <span class="summary-number" id="recentCount">0</span>
        <span>未來 14 天訂單</span>
      </button>
      <button class="summary-card" data-open="notifications">
        <span class="summary-number" id="pendingCount">0</span>
        <span>待發送通知</span>
      </button>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>近期訂單</h2>
          <p>排除完成與未付訂金</p>
        </div>
        <button class="text-btn" data-open="orders">查看全部</button>
      </div>
      <div id="recentOrders" class="card-list"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>待發送通知</h2>
          <p>通知狀態以 ⚠️ 開頭</p>
        </div>
        <button class="text-btn" data-open="notifications">查看全部</button>
      </div>
      <div id="pendingNotifications" class="card-list"></div>
    </section>
  </template>

  <template id="ordersTemplate">
    <section class="section">
      <div class="section-head">
        <div>
          <h2>訂單搜尋</h2>
          <p>可輸入家庭編號、姓名、毛孩、狀態、日期等文字</p>
        </div>
      </div>
      <label class="search-box">
        <span>⌕</span>
        <input id="orderSearch" type="search" placeholder="搜尋任何訂單文字" autocomplete="off" />
      </label>
      <div class="filter-row">
        <button class="chip active" data-order-filter="current">目前訂單</button>
        <button class="chip" data-order-filter="other">完成／未付訂金</button>
        <button class="chip" data-order-filter="all">全部</button>
      </div>
      <div id="orderResults" class="card-list"></div>
    </section>
  </template>

  <template id="notificationsTemplate">
    <section class="section">
      <div class="section-head">
        <div>
          <h2>待發送通知</h2>
          <p>只顯示通知狀態以 ⚠️ 開頭的訂單</p>
        </div>
      </div>
      <div id="notificationResults" class="card-list"></div>
    </section>
  </template>

  <template id="placeholderTemplate">
    <section class="state-card">
      <h2 id="placeholderTitle">功能建置中</h2>
      <p id="placeholderText">這個頁面會在下一階段接上資料與操作。</p>
    </section>
  </template>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
